<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLR - Try Learn Repeat | Regular Verbs - 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #002776;
        --accent: #ffdf00;
        --success: #009c3b;
        --glass: rgba(255, 255, 255, 0.8);
        --shadow: 0 20px 40px rgba(0, 39, 118, 0.15);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        overflow-x: hidden;
      }

      .brand {
        text-align: center;
        margin-bottom: 40px;
      }
      .brand h1 {
        font-weight: 800;
        font-size: 32px;
        color: var(--primary);
        letter-spacing: -1px;
      }
      .brand span { color: var(--success); }

      .progress-wrapper {
        width: 100%;
        max-width: 380px;
        margin-bottom: 25px;
      }
      .stats {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin-bottom: 8px;
      }
      .progress-bar {
        height: 8px;
        background: rgba(0, 0, 0, 0.05);
        border-radius: 10px;
        overflow: hidden;
      }
      #progressFill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--success));
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* FIX 1: min-height instead of fixed height so long phrases don't overflow */
      .scene {
        width: 100%;
        max-width: 380px;
        min-height: 260px;
        perspective: 1200px;
        /* Reserve space so layout doesn't jump */
        position: relative;
      }

      .card {
        width: 100%;
        min-height: 260px;
        position: relative;
        transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        /* FIX 2: webkit prefix for iOS Safari */
        transform-style: preserve-3d;
        -webkit-transform-style: preserve-3d;
        cursor: pointer;
      }

      .card.is-flipped {
        transform: rotateY(180deg);
        -webkit-transform: rotateY(180deg);
      }

      /* FIX 3: Remove hover scale on touch devices — it interferes with the flip */
      @media (hover: hover) {
        .card:hover { transform: scale(1.02) rotateY(0deg); }
        .card.is-flipped:hover { transform: scale(1.02) rotateY(180deg); }
      }

      .card-face {
        position: absolute;
        width: 100%;
        min-height: 260px;
        /* FIX 4: webkit prefix for backface — critical on iOS */
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 30px;
        padding: 30px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow);
        border: 1px solid white;
      }

      .card-front {
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .card-back {
        background: var(--primary);
        color: white;
        transform: rotateY(180deg);
        -webkit-transform: rotateY(180deg);
      }

      .label {
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 16px;
        opacity: 0.6;
      }

      /* FIX 5: Responsive font size so long phrases fit on small screens */
      .phrase {
        font-size: clamp(16px, 4vw, 24px);
        font-weight: 600;
        text-align: center;
        line-height: 1.4;
      }

      .controls {
        display: flex;
        gap: 15px;
        width: 100%;
        max-width: 380px;
        margin-top: 40px;
      }
      .btn {
        flex: 1;
        padding: 18px;
        border: none;
        border-radius: 20px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .btn-secondary { background: white; color: var(--primary); }
      .btn-primary { background: var(--primary); color: white; }
      .btn:active { transform: translateY(2px); }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      .pulse { animation: pulse 0.4s ease-in-out; }

      .btn-shuffle {
        margin-top: 20px;
        background: transparent;
        color: var(--primary);
        border: 1.5px dashed var(--primary);
        padding: 12px;
        border-radius: 15px;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 1.5px;
        cursor: pointer;
        width: 100%;
        max-width: 380px;
        transition: all 0.3s ease;
        opacity: 0.7;
      }
      .btn-shuffle:hover {
        opacity: 1;
        background: rgba(0, 39, 118, 0.05);
        transform: translateY(-1px);
      }

      /* FIX 6: Tap hint for mobile users */
      .tap-hint {
        font-size: 11px;
        color: #888;
        margin-top: 12px;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <h1>TLR <span>Portuguese FlashCards</span></h1>
    </div>

    <div class="progress-wrapper">
      <div class="stats">
        <span id="counter">PHRASE 1</span>
        <span id="percent">0% COMPLETE</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>
    </div>

    <div class="scene">
      <div class="card" id="card" onclick="handleCardClick()">
        <div class="card-face card-front">
          <div class="label">English</div>
          <div class="phrase" id="textEn">Loading...</div>
        </div>
        <div class="card-face card-back">
          <div class="label">Portuguese 🇧🇷</div>
          <div class="phrase" id="textPt">Loading...</div>
          <div style="margin-top: 20px; font-size: 24px">🔊</div>
        </div>
      </div>
    </div>

    <p class="tap-hint">TAP CARD TO REVEAL & HEAR PRONUNCIATION</p>

    <div class="controls">
      <button class="btn btn-secondary" onclick="prev()">← Previous</button>
      <button class="btn btn-primary" onclick="next()">Next →</button>
    </div>
    <button class="btn-shuffle" onclick="shuffle()">⇄ SHUFFLE DECK</button>

    <script>
      let deck = [
          {en: "To walk: I walk in the park on weekends.", pt: "Caminhar: Eu caminho no parque nos fins de semana."},
    {en: "To sing: She sings very well.", pt: "Cantar: Ela canta muito bem."},
    {en: "To dance: They dance samba perfectly.", pt: "Dançar: Eles dançam samba perfeitamente."},
    {en: "To listen: We listen to the news on the radio.", pt: "Escutar: Nós escutamos as notícias no rádio."},
    {en: "To wait: He waits for the bus here.", pt: "Esperar: Ele espera o ônibus aqui."},
    {en: "To study: You study a lot for the exam.", pt: "Estudar: Você estuda muito para a prova."},
    {en: "To speak: I speak with my boss every morning.", pt: "Falar: Eu falo com o meu chefe toda manhã."},
    {en: "To live: They live in a big house.", pt: "Morar: Eles moram numa casa grande."},
    {en: "To think: We think about the future.", pt: "Pensar: A gente pensa no futuro."},
    {en: "To use: Do you use the computer for work?", pt: "Usar: Você usa o computador para trabalhar?"},
    {en: "To open: I open the office early.", pt: "Abrir: Eu abro o escritório cedo."},
    {en: "To learn: She learns Portuguese fast.", pt: "Aprender: Ela aprende português rápido."},
    {en: "To wash: They wash their hands before dinner.", pt: "Lavar: Eles lavam as mãos antes do jantar."},
    {en: "To drink: We drink juice at breakfast.", pt: "Beber: Nós bebemos suco no café da manhã."},
    {en: "To eat: He eats salad for lunch.", pt: "Comer: Ele come salada no almoço."},
    {en: "To run: You run very fast.", pt: "Correr: Você corre muito rápido."},
    {en: "To decide: I decide the menu tonight.", pt: "Decidir: Eu decido o cardápio hoje à noite."},
    {en: "To share: They share the dynamic tasks.", pt: "Dividir: Eles dividem as tarefas dinâmicas."},
    {en: "To understand: We understand the instructions.", pt: "Entender: A gente entende as instruções."},
    {en: "To write: She writes articles for the blog.", pt: "Escrever: Ela escreve artigos para o blog."},
    {en: "To print: He prints the report for the team.", pt: "Imprimir: Ele imprime o relatório para a equipe."},
    {en: "To permit: They permit entry after check-in.", pt: "Permitir: Eles permitem a entrada após o check-in."},
    {en: "To receive: You receive the packages at home.", pt: "Receber: Você recebe os pacotes em casa."},
    {en: "To break: I break the chocolate bar to share.", pt: "Partir: Eu parto a barra de chocolate para dividir."},
    {en: "To sell: We sell delicious cakes here.", pt: "Vender: Nós vendemos bolos deliciosos aqui."}


      ];

      let index = 0;
      const card = document.getElementById("card");
      const progressFill = document.getElementById("progressFill");
      const counter = document.getElementById("counter");
      const percent = document.getElementById("percent");

      // FIX 7: Pre-warm speech synthesis on first user gesture (required on iOS/Android)
      let speechReady = false;
      function primeSpeech() {
        if (speechReady) return;
        const warm = new SpeechSynthesisUtterance("");
        warm.volume = 0;
        window.speechSynthesis.speak(warm);
        speechReady = true;
      }
      document.addEventListener("touchstart", primeSpeech, { once: true });
      document.addEventListener("click", primeSpeech, { once: true });

      function speak(text) {
        window.speechSynthesis.cancel();
        // FIX 8: Small delay prevents iOS from swallowing the utterance after cancel()
        setTimeout(() => {
          const msg = new SpeechSynthesisUtterance(text);
          msg.lang = "pt-BR";
          msg.rate = 0.8;
          window.speechSynthesis.speak(msg);
        }, 50);
      }

      function handleCardClick() {
        if (!card.classList.contains("is-flipped")) {
          card.classList.add("is-flipped");
          speak(deck[index].pt);
        } else {
          card.classList.add("pulse");
          setTimeout(() => card.classList.remove("pulse"), 400);
          speak(deck[index].pt);
        }
      }

      function update() {
        card.classList.remove("is-flipped");
        const currentProgress = ((index + 1) / deck.length) * 100;
        setTimeout(() => {
          document.getElementById("textEn").innerText = deck[index].en;
          document.getElementById("textPt").innerText = deck[index].pt;
          counter.innerText = `PHRASE ${index + 1} OF ${deck.length}`;
          percent.innerText = `${Math.round(currentProgress)}% COMPLETE`;
          progressFill.style.width = currentProgress + "%";
        }, 300);
      }

      function next() {
        index = (index + 1) % deck.length;
        update();
      }

      function prev() {
        index = (index - 1 + deck.length) % deck.length;
        update();
      }

      function shuffle() {
        deck.sort(() => Math.random() - 0.5);
        index = 0;
        update();
      }

      update();
    </script>
  </body>
</html>
